<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Weather app</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body class="bg-Neutral-900 text-white">
    <header>
      <head>
        <img src="/images/logo.svg" alt="weather now logo" />
        <p>weather now</p>
      </head>
      <div>
        <img src="/images/icon-units.svg" alt="settings icon" class="" />
        <p>Units <img src="/images/icon-dropdown.svg" alt="" /></p>
      </div>
    </header>
    <main>
      <h1>How's the sky looking today</h1>
      <div class="search-section">
        <form action="">
          <img src="/images/icon-search.svg" alt="" />
          <input type="search" placeholder="search for a place..." />
          <button>search</button>
        </form>
      </div>
      <section class="result-section">
        <p>no search result found!</p>
      </section>
    </main>

    <!-- Insert precipitation here -->

    Daily forecast
    <!-- Insert daily forecast for the next 7 days here -->

    Hourly forecast

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" class="bg-green-500"

</html>
