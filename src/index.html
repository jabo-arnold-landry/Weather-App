<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Weather app</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body class="bg-Neutral-900 text-white">
    <header class="flex flex-wrap justify-between items-center px-4 py-4">
      <head>
        <img src="/images/logo.svg" alt="weather now logo" class="max-w-2/5" />
      </head>
      <div
        class="flex items-center gap-1.5 cursor-pointer bg-Neutral-800 px-2 py-1 rounded-md"
      >
        <img src="/images/icon-units.svg" alt="settings icon" class="" />
        <p>Units</p>
        <img src="/images/icon-dropdown.svg" alt="" />
      </div>
    </header>
    <main class="flex flex-col items-center gap-5">
      <h1 class="text-2xl">How's the sky looking today</h1>
      <div class="search-section">
        <form action="" class="">
          <div class="relative grid sm:flex sm:items-center gap-3">
            <img
              src="/images/icon-search.svg"
              alt="search-icon"
              class="size-5"
            />
            <input
              type="search"
              placeholder="search for a place..."
              class="bg-Neutral-800 rounded-md px-4 py-1"
            />
            <button
              class="col-span-full self-center bg-Blue-500 px-3 py-0.5 rounded-md border-none sm:py-1 focus-within:border-2"
            >
              search
            </button>
          </div>
        </form>
      </div>
      <section class="result-section">
        <p>no search result found!</p>
      </section>
    </main>
    <!-- Insert temperature here -->

    Humidity
    <!-- Insert humidity here -->

    Wind
    <!-- Insert wind here -->

    Precipitation
    <!-- Insert precipitation here -->

    Daily forecast
    <!-- Insert daily forecast for the next 7 days here -->

    Hourly forecast
    <!-- Insert hourly forecast for the selected day here -->

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" class="bg-green-500"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>
    <script src="/src/javascript/index.js"></script>
  </body>
</html>
