<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Weather app</title>
    <link rel="stylesheet" href="output.css" />
  </head>
  <body class="bg-Neutral-900 text-white">
    <header class="flex flex-wrap justify-between items-center px-4 py-4">
      <head>
        <img src="/images/logo.svg" alt="weather now logo" class="max-w-2/5" />
      </head>
      <section class="relative">
        <div
          class="flex items-center gap-2 cursor-pointer bg-Neutral-800 px-2 py-1 rounded-md group hover:bg-Neutral-600 transition-colors duration-300 ease-in-out delay-150"
        >
          <img src="/images/icon-units.svg" alt="settings icon" class="" />
          <p>Units</p>
          <img src="/images/icon-dropdown.svg" alt="" />
        </div>
        <div
          class="drop-down-menu bg-Neutral-800 min-w-fit py-1.5 pl-2 pr-5 absolute -right-1 z-30 rounded-md mt-1 hidden"
        >
          <span class="text-neutral-200 line-clamp-1 mb-2 truncate"
            >switch to emperial</span
          >
          <div class="grid gap-2 divide-y-2 divide-Neutral-600 mb-2">
            <span class="text-Neutral-300">temperature</span>
            <div class="options text-white text-md space-y-3">
              <button>celcius(<sup>o</sup>C)</button> <br />
              <button>fahrenheit(<sup>o</sup>F)</button>
            </div>
          </div>
          <div class="grid gap-2 divide-y-2 divide-Neutral-600 mb-2">
            <span class="text-Neutral-300">wind speed</span>
            <div class="options text-white text-md space-y-3">
              <button>km/h</button> <br />
              <button>mph</button>
            </div>
          </div>
          <div class="grid gap-2 divide-y-2 divide-Neutral-600 mb-2">
            <span class="text-Neutral-300">precipitation</span>
            <div class="options text-white text-md space-y-3">
              <button>millimeter(mm)</button> <br />
              <button>inches(in)</button>
            </div>
          </div>
        </div>
      </section>
    </header>

    <main class="flex flex-col items-center gap-5 @container animate-pop">
      <h1 class="text-3xl text-center">How's the sky looking today?</h1>
      <div class="">
        <form action="">
          <div
            class="relative grid @xs:flex @xs:items-center @xs:mx-2.5 gap-3 mx-3 sm:m-0"
          >
            <img
              src="/images/icon-search.svg"
              alt="search-icon"
              class="size-5 absolute top-2 left-2"
            />
            <input
              type="search"
              placeholder="search for a place..."
              class="bg-Neutral-800 rounded-md px-8 py-1.5 w-full placeholder:px-2 placeholder:truncate focus-within:outline-2 focus-within:outline-Neutral-300 hover:bg-Neutral-600 transition-colors duration-300 ease-in-out delay-150"
            />
            <button
              class="col-span-full self-center bg-Blue-500 cursor-pointer px-3 py-1 rounded-md border-none capitalize focus-within:border-2 hover:bg-Blue-700 transition-colors duration-300 ease-in-out delay-150 disabled:bg-Blue-500 disabled:cursor-wait has-[img]:px-4 has-[img]:flex gap-1 justify-center items-center"
              type="submit"
            >
              search
            </button>
          </div>
          <p id="error-message" class="empty:hidden text-center"></p>
        </form>
      </div>
      <section class="result-section"></section>
    </main>
    <section class="grid gap-3 place-content-center place-items-center mx-2.5">
      <img src="/images/icon-error.svg" alt="error image diaplay" />
      <div class="flex flex-col items-center justify-center gap-2.5">
        <h1 class="">something went wrong</h1>
        <p class="text-center sm:max-w-[25rem]">
          We couldn't connect to the server(API error), Please try again in a
          few moments
        </p>
        <button class="flex gap-3">
          <img src="/images/icon-retry.svg" alt="retry image" />retry
        </button>
      </div>
    </section>
    <article
      id="weather-section"
      class="grid gap-2.5 place-content-center sm:flex md:grid-cols-2 md:gap-4"
      hidden
    >
      <div class="grid gap-3 place-content-center mx-1.5">
        <section
          class="bg-[url('/images/bg-today-small.svg')] bg-no-repeat bg-cover md:bg-[url('/images/bg-today-large.svg')] md:bg-[100%] mx-4"
        >
          <div
            class="grid place-items-center sm:flex sm:justify-between mx-4"
            id="location-info"
          ></div>
        </section>
        <!-- Insert temperature here -->
        <section
          id="general-info-section"
          class="grid auto-cols-max gap-y-3 gap-x-0.5 sm:grid-cols-3 md:grid-cols-4"
        ></section>
        <!-- Insert daily forecast for the next 7 days here -->
        <h2>daily forecast</h2>
        <section
          id="daily-forecast-section"
          class="flex flex-wrap gap-2.5 mx-1.5"
        ></section>
      </div>
      <div class="second-section">
        <!-- Insert hourly forecast for the selected day here -->
        <section
          id="hourly-forecast-section"
          class="bg-Neutral-700 py-3 px-4 w-full rounded-md"
        >
          <div class="flex justify-between px-2">
            <strong class="font-light">Hourly forecast</strong>
            <div class="relative">
              <button
                class="flex items-center gap-2 cursor-pointer bg-Neutral-600 px-4 py-0.5 rounded-md group hover:bg-Neutral-600 transition-colors duration-300 ease-in-out delay-150 capitalize"
              >
                Monday
                <img src="/images/icon-dropdown.svg" alt="drop-down-icon" />
              </button>
              <div
                class="hidden grid gap-2 bg-Neutral-700 absolute top-7 px-4 py-1.5 z-20 rounded-md empty:hidden"
                id="days-list"
              ></div>
            </div>
          </div>
          <section class="hourly-forecast" id="hourly-data"></section>
        </section>
      </div>
    </article>

      <a href="https://www.frontendmentor.io?ref=challenge" class="bg-green-500"

    </div> -->
    <script type="module" src="/src/javascript/index.js"></script>
  </body>
</html>
